<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>JOBSIM — 직무 시뮬레이션 적성 탐색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090a;--surface:#111215;--border:#1e2025;--muted:#4a4f5c;
      --text:#f7f8f8;--sub:#8a8f9c;--accent:#5e6ad2;--accent-hi:#7b83e0;
      --danger:#e05e5e;--success:#5ec98e;--warn:#d2a85e;--r:10px;--mw:720px;
    }
    html{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;font-size:15px;line-height:1.65}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px}
    .page{width:100%;max-width:var(--mw);animation:fi .25s ease}
    @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* 브랜드 */
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:48px}
    .brand-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
    .brand-name{font-size:14px;font-weight:600}

    /* 타이포 */
    .stitle{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
    .sdesc{color:var(--sub);font-size:14px;margin-bottom:32px}

    /* 카드 */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}

    /* 직무 선택 그리드 */
    .job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:28px}
    .job-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:20px 18px;cursor:pointer;transition:border-color .15s,background .15s}
    .job-card:hover{border-color:var(--accent)}
    .job-card.sel{border-color:var(--accent);background:#14163a}
    .job-card .jicon{font-size:26px;margin-bottom:10px}
    .job-card .jname{font-size:14px;font-weight:600;margin-bottom:4px}
    .job-card .jsub{font-size:12px;color:var(--sub)}

    /* 인풋 */
    textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;line-height:1.7;padding:14px 16px;resize:vertical;min-height:120px;outline:none;transition:border-color .15s}
    textarea:focus{border-color:var(--accent)}
    textarea::placeholder{color:var(--muted)}

    /* 버튼 */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;border:none;outline:none}
    .btn-p{background:var(--accent);color:#fff}.btn-p:hover{opacity:.85}
    .btn-g{background:transparent;border:1.5px solid var(--border);color:var(--sub)}.btn-g:hover{border-color:var(--accent);color:var(--text)}
    .btn:disabled{opacity:.35;cursor:not-allowed}

    /* 진행바 */
    .prog{width:100%;height:2px;background:var(--border);border-radius:2px;margin-bottom:32px}
    .prog-f{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}

    /* 배지 */
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#1a1c2e;color:var(--accent)}

    /* 미션 */
    .mhdr{display:flex;align-items:center;gap:10px;margin-bottom:20px}
    .mstep{font-size:12px;color:var(--sub)}
    .scenario{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:20px;font-size:14px;color:var(--sub);line-height:1.8}
    .task-lbl{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
    .task-txt{font-size:15px;font-weight:500;line-height:1.7}

    /* 선택지 */
    .opt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .opt-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;text-align:left;color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;transition:border-color .15s,background .15s;line-height:1.5}
    .opt-btn:hover{border-color:var(--accent)}.opt-btn.sel{border-color:var(--accent);background:#14163a}

    /* 자기보고 */
    .sr{border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-top:24px}
    .sr-title{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:18px;text-transform:uppercase;letter-spacing:.6px}
    .sr-row{margin-bottom:18px}
    .sr-q{font-size:14px;margin-bottom:10px}
    .sr-opts{display:flex;gap:8px}
    .sr-btn{flex:1;padding:9px 6px;border-radius:7px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--sub);cursor:pointer;transition:border-color .15s,color .15s,background .15s;text-align:center}
    .sr-btn:hover{border-color:var(--accent);color:var(--text)}.sr-btn.sel{border-color:var(--accent);background:#14163a;color:var(--text)}

    /* 사전질문 */
    .pq-lbl{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px}
    .pq-txt{font-size:15px;font-weight:500;margin-bottom:12px}

    /* 결과 섹션 */
    .rs{margin-bottom:40px}
    .rs-title{font-size:14px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}

    /* 레이더 */
    .radar-wrap{display:flex;justify-content:center;margin-bottom:12px}
    .axis-score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
    .axis-score{border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--bg)}
    .axis-score-k{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .axis-score-v{font-size:18px;font-weight:700;color:var(--text)}
    .axis-score-ref{font-size:11px;color:var(--warn)}
    .ev-list{display:flex;flex-direction:column;gap:10px}
    .ev-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--surface)}
    .ev-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
    .ev-title{font-size:14px;font-weight:700}
    .ev-meta{font-size:12px;color:var(--sub);white-space:nowrap}
    .ev-low{color:var(--warn)}
    .ev-quotes{display:flex;flex-direction:column;gap:6px;margin:8px 0}
    .ev-quote{border-left:2px solid var(--accent);padding-left:10px;color:var(--text);font-size:13px}
    .ev-rationale{font-size:12px;color:var(--sub);line-height:1.6}
    .log-note{font-size:12px;color:var(--sub);border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--bg)}

    /* 적합도 바 */
    .compat-list{display:flex;flex-direction:column;gap:20px}
    .compat-row{display:flex;flex-direction:column;gap:6px}
    .compat-top{display:flex;align-items:center;gap:14px}
    .compat-name{font-size:13px;font-weight:600;min-width:130px}
    .compat-bw{flex:1;height:8px;background:var(--border);border-radius:4px}
    .compat-bf{height:100%;border-radius:4px;transition:width .6s ease}
    .compat-sc{font-size:13px;font-weight:700;min-width:44px;text-align:right}
    .compat-ref{font-size:11px;color:var(--sub);padding-left:2px}
    .sil-warn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;color:var(--warn);background:rgba(210,168,94,.1);border:1px solid rgba(210,168,94,.25);margin-top:2px}

    /* 사분면 */
    .quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .quad-cell{border:1.5px solid var(--border);border-radius:8px;padding:16px 14px;font-size:13px}
    .quad-cell.hl{border-color:var(--accent);background:#14163a}
    .quad-jname{font-weight:700;margin-bottom:4px;font-size:14px}
    .quad-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .quad-desc{color:var(--sub);font-size:12px;line-height:1.5}
    .q1 .quad-lbl{color:var(--success)}.q2 .quad-lbl{color:var(--warn)}.q3 .quad-lbl{color:var(--accent-hi)}.q4 .quad-lbl{color:var(--danger)}

    /* 직업 추천 */
    .rec-list{display:flex;flex-direction:column;gap:10px}
    /* 추천 카드: 직업명 + 유사도 % 바 하나 */
    .rec-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:16px 18px}
    .rec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .rec-jname{font-size:14px;font-weight:600}
    .rec-pct{font-size:13px;font-weight:700;color:var(--accent)}
    /* 5축 매치바 */
    .ax-bars{display:flex;flex-direction:column;gap:6px}
    .ax-row{display:flex;align-items:center;gap:8px}
    .ax-lbl{font-size:11px;color:var(--sub);min-width:60px}
    .ax-bw{flex:1;height:5px;background:var(--border);border-radius:3px;position:relative}
    .ax-bf-job{height:100%;border-radius:3px;background:var(--warn);opacity:.6;position:absolute;top:0;left:0}
    .ax-bf-me{height:100%;border-radius:3px;background:var(--accent);position:absolute;top:0;left:0}
    .ax-vals{font-size:10px;color:var(--sub);min-width:60px;text-align:right}

    /* gap table */
    .gap-tbl{width:100%;border-collapse:collapse}
    .gap-tbl th,.gap-tbl td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
    .gap-tbl th{color:var(--sub);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.6px}
    .gap-tbl td:first-child{color:var(--accent);font-weight:600;white-space:nowrap}

    hr{border:none;border-top:1px solid var(--border);margin:28px 0}
    @media(max-width:520px){
      .job-grid{grid-template-columns:1fr 1fr}
      .quad-grid{grid-template-columns:1fr}
      .axis-score-grid{grid-template-columns:1fr 1fr}
      .sr-opts{flex-wrap:wrap}.sr-btn{flex:0 0 auto;min-width:80px}
    }
  </style>
</head>

const state={
  screen:'select', selectedJobs:[], preqIndex:0, preqAnswers:{},
  missionJobIndex:0, missionStepIndex:0, missionAnswer:'', selectedOption:null,
  selfReport:{}, missionScores:{}, evaluationLogs:[], axisProfile:null, compatibility:{},
};

const EVAL_LOG_KEY='jobsim:evaluation_logs:v1';

function esc(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function readStoredEvaluationLogs(){
  try{return JSON.parse(localStorage.getItem(EVAL_LOG_KEY)||'[]');}
  catch(_){return[];}
}

function saveEvaluationLog(entry){
  state.evaluationLogs.push(entry);
  const logs=[...readStoredEvaluationLogs(),entry].slice(-200);
  try{localStorage.setItem(EVAL_LOG_KEY,JSON.stringify(logs));}catch(_){}
}

function clamp(v,min,max){return Math.min(Math.max(v,min),max)}
function normText(v){return String(v||'').replace(/\s+/g,' ').trim().toLowerCase()}
function uniqueRatio(v){
  const toks=normText(v).split(/\s+/).filter(Boolean);
  return toks.length?new Set(toks).size/toks.length:0;
}
function countNums(v){return (String(v||'').match(/\d+(?:[.,]\d+)?%?/g)||[]).length}
function keywordHits(answer,keywords){
  const txt=normText(answer);
  return (keywords||[]).map(k=>String(k||'').trim()).filter(k=>k&&txt.includes(normText(k)));
}
function markerHits(answer,markers){
  const txt=normText(answer);
  return markers.filter(m=>txt.includes(normText(m))).length;
}

function buildFallbackEvaluation(answer,mission,missionScore){
  const len=normText(answer).length;
  const uniq=uniqueRatio(answer);
  const nums=countNums(answer);
  const repPenalty=uniq<0.45?0.12:0;
  const detailBonus=len>=80?0.08:len>=30?0.04:0;
  const markers={
    AX1:['데이터','수치','비율','비교','분석','근거','통계','p=','%'],
    AX2:['확인','관찰','패턴','추적','탐색','검사','파악'],
    AX3:['우선','먼저','전략','가설','검증','결정','선택','단기','장기','권고'],
    AX4:['팀','공유','협업','보고','역할','승인','부서'],
    AX5:['고객','공감','사과','소통','안내','신뢰','사용자','이해']
  };
  const axes=Object.fromEntries(AXES.map(ax=>{
    const hits=keywordHits(answer,mission.rubric?.[ax]||[]);
    const mh=markerHits(answer,markers[ax]||[]);
    const signal=mission.axis_signals?.[ax]||0;
    const raw=hits.length*0.45+mh*0.18+(ax==='AX1'?Math.min(nums,3)*0.15:0)+signal*0.8;
    const score=raw>=1.8&&len>=40&&uniq>=0.45?2:raw>=0.45?1:0;
    const conf=score===0
      ? clamp(0.08+signal*0.1,0.05,0.18)
      : clamp(0.18+hits.length*0.06+mh*0.04+signal*0.12+detailBonus-repPenalty,0.16,0.52);
    return[ax,{score,confidence:Number(conf.toFixed(2)),evidence:[],reason:`Fallback heuristic. keyword_hits=${hits.length}, marker_hits=${mh}, signal=${signal.toFixed(2)}.`}];
  }));
  const flags=['low_confidence'];
  if(len<15)flags.push('too_short');
  if(uniq<0.45)flags.push('ambiguous');
  return{mission_id:mission.mission_id,prompt_version:'keyword-fallback-v2',flags,axes};
}

function axisEvidenceSummary(){
  const merged=Object.fromEntries(AXES.map(ax=>[ax,{score:0,confidence:0,evidence:[],reason:'',flags:[],sources:0}]));
  const counts=Object.fromEntries(AXES.map(ax=>[ax,0]));
  state.evaluationLogs.forEach(log=>{
    const axes=log.evaluation?.axes||{};
    AXES.forEach(ax=>{
      const r=axes[ax];if(!r)return;
      if(r.score>0||r.evidence?.length||r.confidence>0){counts[ax]++;merged[ax].score+=r.score||0;merged[ax].confidence+=r.confidence||0;merged[ax].sources++;}
      (r.evidence||[]).forEach(ev=>merged[ax].evidence.push({...ev,mission_title:log.mission_title}));
      if(r.reason&&r.reason!==merged[ax].reason)merged[ax].reason=r.reason;
      (log.evaluation?.flags||[]).forEach(f=>{if(!merged[ax].flags.includes(f))merged[ax].flags.push(f);});
    });
  });
  AXES.forEach(ax=>{
    if(counts[ax]>0){
      merged[ax].score=Math.round(merged[ax].score/counts[ax]);
      merged[ax].confidence=merged[ax].confidence/counts[ax];
    }
    merged[ax].evidence=merged[ax].evidence.slice(0,3);
  });
  return merged;
}

function evidenceStatusText(ax,r){
  const evCount=r.evidence?.length||0;
  const hasLowConf=r.flags?.includes('low_confidence');
  const tooShort=r.flags?.includes('too_short');
  if(tooShort)return`${AX_LABELS[ax]} 영역은 답변이 짧아 충분한 판단이 어렵습니다.`;
  if(evCount>0&&r.confidence>=0.7)return`${AX_LABELS[ax]} 영역은 답변에서 명확한 근거가 확인되어 신뢰도 있게 평가되었습니다.`;
  if(evCount>0&&hasLowConf)return`${AX_LABELS[ax]} 영역은 관련 내용이 있으나 신뢰도가 낮아 보수적으로 해석됩니다.`;
  if(evCount>0)return`${AX_LABELS[ax]} 영역은 일부 근거가 확인되었으나 추가 답변이 있으면 더 정확히 평가할 수 있습니다.`;
  if(r.score>0)return`${AX_LABELS[ax]} 영역은 내용이 확인되었으나 구체적인 근거 문장이 부족합니다.`;
  return`${AX_LABELS[ax]} 영역에서 관련 행동이나 근거를 찾을 수 없습니다.`;
}

/* ── 채점 ── */
function sigmoid(x){return 1/(1+Math.exp(-x))}

function keywordScoreAnswer(answer,mission){
  const txt=(answer||'').toLowerCase();
  const out={};
  AXES.forEach(ax=>{
    const kws=mission.rubric[ax]||[];
    if(!kws.length){out[ax]=0;return;}
    let n=0; kws.forEach(k=>{if(txt.includes(k.toLowerCase()))n++;});
    out[ax]=sigmoid((n-kws.length*0.3)/(kws.length*0.3+0.01))*(mission.axis_signals[ax]||0);
  });
  return out;
}

async function scoreAnswer(answer,mission){
  try{
    const res=await fetch('/api/evaluate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({answer,mission})
    });
    if(!res.ok)throw new Error(await res.text());
    const data=await res.json();
    const missionScore=data.missionScore||keywordScoreAnswer(answer,mission);
    return{missionScore,evaluation:data.evaluation||buildFallbackEvaluation(answer,mission,missionScore)};
  }catch(err){
    console.warn('LLM evaluation failed. Falling back to keyword scoring.',err);
    const missionScore=keywordScoreAnswer(answer,mission);
    return{missionScore,evaluation:buildFallbackEvaluation(answer,mission,missionScore)};
  }
}

function computeProfile(list){
  const tot=Object.fromEntries(AXES.map(ax=>[ax,0]));
  const cnt=Object.fromEntries(AXES.map(ax=>[ax,0]));
  list.forEach(s=>AXES.forEach(ax=>{tot[ax]+=(s[ax]||0);cnt[ax]++;}));
  return Object.fromEntries(AXES.map(ax=>[ax,cnt[ax]>0?tot[ax]/cnt[ax]:0]));
}

function normalizeProfile(p){
  const total=AXES.reduce((s,ax)=>s+(p[ax]||0),0);
  if(total===0)return p;
  return Object.fromEntries(AXES.map(ax=>[ax,(p[ax]||0)/total]));
}

function cosineSim(a,b){
  const va=AXES.map(k=>a[k]||0), vb=AXES.map(k=>b[k]||0);
  const dot=va.reduce((s,v,i)=>s+v*vb[i],0);
  const mA=Math.sqrt(va.reduce((s,v)=>s+v*v,0));
  const mB=Math.sqrt(vb.reduce((s,v)=>s+v*v,0));
  return mA*mB===0?0:dot/(mA*mB);
}

function computeCompatibility(profile, rawProfile){
  const sum=AXES.reduce((s,ax)=>s+(profile[ax]||0),0);
  const result={};

  // 실제 수행 점수 합계 → 성과가 낮으면 적합도도 낮아지도록
  const rawTotal=AXES.reduce((s,ax)=>s+(rawProfile?rawProfile[ax]||0:0),0);
  const perfFactor=Math.min(rawTotal/0.4, 1.0);

  state.selectedJobs.forEach(jc=>{
    if(sum===0){result[jc]=0;return;}
    const jd=JOB_DEFS.find(j=>j.job_code===jc);
    if(!jd){result[jc]=0;return;}
    const jw=JOB_WEIGHTS[jd.real_job_code];
    if(!jw){result[jc]=0;return;}
    const sim=cosineSim(normalizeProfile(profile),jw.w);
    result[jc]=Math.round((sim+1)/2*perfFactor*100);
  });
  return result;
}

function getRecommendations(profile,clusterId,excludeCode,topN=3){
  const norm=normalizeProfile(profile);
  return Object.entries(JOB_WEIGHTS)
    .filter(([c,v])=>v.c===clusterId&&v.r===true&&c!==excludeCode)
    .map(([c,v])=>({code:c,name:v.n,sim:cosineSim(norm,v.w),w:v.w}))
    .sort((a,b)=>b.sim-a.sim).slice(0,topN);
}

// 적합도 낮을 때 다른 군집에서 추천
function getCrossClusterRecommendations(profile,excludeClusterId,excludeCode,topN=3){
  const norm=normalizeProfile(profile);
  return Object.entries(JOB_WEIGHTS)
    .filter(([c,v])=>v.c!==excludeClusterId&&v.r===true&&c!==excludeCode)
    .map(([c,v])=>({code:c,name:v.n,sim:cosineSim(norm,v.w),w:v.w,cluster:v.c}))
    .sort((a,b)=>b.sim-a.sim).slice(0,topN);
}

function emotionScore(jc){
  const ms=getMissions(jc); let s=0,n=0;
  ms.forEach(m=>{const sr=state.selfReport[m.mission_id];if(!sr)return;s+=(4-sr.fun)/3;n++;});
  return n>0?s/n:0.5;
}

/* ── 유틸 ── */
function getMissions(jc){return ALL_MISSIONS.filter(m=>m.job_code===jc)}
function curMission(){return getMissions(state.selectedJobs[state.missionJobIndex])[state.missionStepIndex]||null}
function totalM(){return state.selectedJobs.reduce((s,jc)=>s+getMissions(jc).length,0)}
function doneM(){let n=0;for(let i=0;i<state.missionJobIndex;i++)n+=getMissions(state.selectedJobs[i]).length;return n+state.missionStepIndex;}
function isLast(){const jc=state.selectedJobs[state.missionJobIndex];const ms=getMissions(jc);return state.missionJobIndex===state.selectedJobs.length-1&&state.missionStepIndex===ms.length-1;}

/* ── 레이더 (내 프로파일 파란 채움 + 직업 기준 금색 점선) ── */
function rRadar(){
  const p=state.axisProfile;
  const axDefs=AXES.map(key=>({key,label:AX_LABELS[key]}));
  const N=5, cx=185, cy=175, R=120, LR=R+34;
  function pt(r,i){const a=(Math.PI*2*i/N)-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}

  // 그리드
  let grid='';
  [.2,.4,.6,.8,1].forEach(ratio=>{
    const pts=axDefs.map((_,i)=>pt(R*ratio,i).join(','));
    grid+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#1e2025" stroke-width="1"/>`;
  });
  // 축선
  const axLines=axDefs.map((_,i)=>{const[x,y]=pt(R,i);return`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#1e2025" stroke-width="1"/>`;}).join('');

  // 내 프로파일 폴리곤
  const myPts=axDefs.map((ax,i)=>pt(R*Math.min((p[ax.key]||0)*RADAR_SCALE,1),i).join(','));
  const myPoly=`<polygon points="${myPts.join(' ')}" fill="rgba(94,106,210,0.30)" stroke="#5e6ad2" stroke-width="2.5"/>`;

  // 참조 직업 (최고 적합도)
  let refPoly='', legend='';
  const best=Object.entries(state.compatibility).sort((a,b)=>b[1]-a[1])[0];
  if(best){
    const bJd=JOB_DEFS.find(j=>j.job_code===best[0]);
    const bJw=bJd&&JOB_WEIGHTS[bJd.real_job_code];
    if(bJw){
      const refPts=axDefs.map((ax,i)=>pt(R*Math.min((bJw.w[ax.key]||0)*RADAR_SCALE,1),i).join(','));
      refPoly=`<polygon points="${refPts.join(' ')}" fill="rgba(210,168,94,0.12)" stroke="#d2a85e" stroke-width="2" stroke-dasharray="6,3"/>`;
      legend=`<g>
        <rect x="16" y="308" width="12" height="12" rx="2" fill="rgba(94,106,210,0.4)" stroke="#5e6ad2" stroke-width="1.5"/>
        <text x="33" y="319" style="fill:#8a8f9c;font-size:11px">내 프로파일</text>
        <line x1="110" y1="314" x2="130" y2="314" stroke="#d2a85e" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="135" y="319" style="fill:#8a8f9c;font-size:11px">${bJd.job_name} 기준</text>
      </g>`;
    }
  }

  // 라벨 + 비중 수치
  const labels=axDefs.map((ax,i)=>{
    const[lx,ly]=pt(LR,i);
    const ta=lx<cx-8?'end':lx>cx+8?'start':'middle';
    const val=Math.round((p[ax.key]||0)*100);
    const[px,py]=pt(R*Math.min((p[ax.key]||0)*RADAR_SCALE,1)+14,i);
    return`<text x="${lx}" y="${ly+4}" text-anchor="${ta}" style="fill:#f7f8f8;font-size:12px;font-weight:600">${ax.label}</text>
    <text x="${px}" y="${py+4}" text-anchor="middle" style="fill:#7b83e0;font-size:11px;font-weight:700">${val}%</text>`;
  }).join('');

  const bestJd=best&&JOB_DEFS.find(j=>j.job_code===best[0]);
  const bestW=bestJd&&JOB_WEIGHTS[bestJd.real_job_code]?.w;
  const scoreRows=AXES.map(ax=>{
    const mine=Math.round((p[ax]||0)*100);
    const ref=bestW?Math.round((bestW[ax]||0)*100):0;
    return`<div class="axis-score">
      <div class="axis-score-k">${AX_LABELS[ax]}</div>
      <div class="axis-score-v">${mine}</div>
      <div class="axis-score-ref">직무 평균 ${ref}</div>
    </div>`;
  }).join('');

  return`<div class="rs">
  <div class="rs-title">사고방식 5축 프로파일</div>
  <div class="radar-wrap"><svg width="370" height="335" viewBox="0 0 370 335" style="overflow:visible">
    ${grid}${axLines}${refPoly}${myPoly}${labels}${legend}
  </svg></div><div class="axis-score-grid">${scoreRows}</div></div>`;
}

/* ── 적합도 바 ── */
function rEvidence(){
  const summary=axisEvidenceSummary();
  const cards=AXES.map(ax=>{
    const r=summary[ax];
    const evCount=r.evidence?.length||0;
    const low=r.confidence<0.55||evCount===0;

    // 인용 근거 문장만 표시 (quote만, 내부 수치 노출 없음)
    const quotes=evCount>0
      ? r.evidence.map(ev=>`<div class="ev-quote">"${esc(ev.quote)}"</div>`).join('')
      : '';

    // 자연어 설명: evidenceStatusText만 사용 (score/confidence/flags 노출 없음)
    const summary_text=evidenceStatusText(ax,r);

    return`<div class="ev-card">
      <div class="ev-head">
        <div class="ev-title">${ax} ${AX_LABELS[ax]}</div>
        <div class="ev-meta${low?' ev-low':''}">${low?'판단 근거 부족':'근거 확인됨'}</div>
      </div>
      ${quotes?`<div class="ev-quotes">${quotes}</div>`:''}
      <div class="ev-rationale">${esc(summary_text)}</div>
    </div>`;
  }).join('');
  return`<div class="rs"><div class="rs-title">Evidence 기반 평가 설명</div><div class="ev-list">${cards}</div></div>`;
}

function rEvaluationLogSummary(){
  const stored=readStoredEvaluationLogs();
  const versions=[...new Set(state.evaluationLogs.map(l=>l.prompt_version).filter(Boolean))].join(', ')||'없음';
  return`<div class="rs">
    <div class="rs-title">평가 로그 저장 구조</div>
    <div class="log-note">
      이번 세션 ${state.evaluationLogs.length}건, 브라우저 누적 ${stored.length}건을 저장했습니다.
      스키마는 session_id, user_key, job_code, mission_id, answer, self_report, prompt_version, evaluation, mission_score를 포함합니다.
      현재 prompt version: ${esc(versions)}
    </div>
  </div>`;

function rCompat(){
  const items=state.selectedJobs.map(jc=>{
    const jd=JOB_DEFS.find(j=>j.job_code===jc);
    const sc=state.compatibility[jc]||0;
    const jw=JOB_WEIGHTS[jd.real_job_code];
    return{jc,name:jd.job_name,icon:jd.icon,score:sc,realName:jw?jw.n:'',cluster:jw?jw.c:'',rel:jw?jw.r:true};
  }).sort((a,b)=>b.score-a.score);

  const rows=items.map(it=>{
    const c=it.score>=70?'var(--success)':it.score>=50?'var(--accent)':'var(--muted)';
    const warn=!it.rel?`<div class="sil-warn">⚠️ 이 직무는 복합적 역량의 하이브리드 직무로 적합도 스펙트럼이 넓을 수 있습니다.</div>`:'';
    return`<div class="compat-row">
      <div class="compat-top">
        <span class="compat-name">${it.icon} ${it.name}</span>
        <div class="compat-bw"><div class="compat-bf" style="width:${it.score}%;background:${c}"></div></div>
        <span class="compat-sc" style="color:${c}">${it.score}점</span>
      </div>
      <div class="compat-ref">분석 기준: ${it.realName} (군집 ${it.cluster})</div>
      ${warn}
    </div>`;
  }).join('');
  return`<div class="rs"><div class="rs-title">직무 적합도</div><div class="compat-list">${rows}</div></div>`;
}

/* ── 사분면 ── */
function rQuad(){
  function perf(jc){
    const ss=state.missionScores[jc]||[];if(!ss.length)return 0.5;
    return ss.reduce((s,sc)=>s+AXES.reduce((a,k)=>a+(sc[k]||0),0)/AXES.length,0)/ss.length;
  }
  function axisAvg(jc){
    const ss=state.missionScores[jc]||[];
    const avg=Object.fromEntries(AXES.map(ax=>[ax,0]));
    if(!ss.length)return avg;
    AXES.forEach(ax=>{avg[ax]=ss.reduce((s,row)=>s+(row[ax]||0),0)/ss.length;});
    return avg;
  }
  function quadText(jd,pf,em,compat,topAx,lowAx,count){
    const perfPct=Math.round(pf*100), emotionPct=Math.round(em*100);
    const perfBand=pf>=0.45?'수행 높음':'수행 낮음';
    const emotionBand=em>=0.6?'흥미 높음':'흥미 낮음';
    const label=`${perfBand} · ${emotionBand}`;
    const detail=count
      ? `${jd.job_name} 미션 ${count}개 기준, 수행 ${perfPct}%, 흥미 ${emotionPct}%, 직무 적합도 ${compat}점입니다. 가장 강한 축은 ${AX_LABELS[topAx]}이고 가장 낮은 축은 ${AX_LABELS[lowAx]}입니다.`
      : `${jd.job_name} 평가 데이터 0개, 수행 ${perfPct}%, 흥미 ${emotionPct}%, 직무 적합도 ${compat}점입니다.`;
    return{label,detail};
  }
  const cards=state.selectedJobs.map(jc=>{
    const jd=JOB_DEFS.find(j=>j.job_code===jc);
    const pf=perf(jc),em=emotionScore(jc);
    const q=pf>=0.45&&em>=0.6?'q1':pf>=0.45&&em<0.6?'q2':pf<0.45&&em>=0.6?'q3':'q4';
    const avg=axisAvg(jc);
    const sorted=AXES.slice().sort((a,b)=>(avg[b]||0)-(avg[a]||0));
    const txt=quadText(jd,pf,em,state.compatibility[jc]||0,sorted[0],sorted[sorted.length-1],(state.missionScores[jc]||[]).length);
    return`<div class="quad-cell ${q}${q==='q1'?' hl':''}">
      <div class="quad-jname">${jd.icon} ${jd.job_name}</div>
      <div class="quad-lbl">${txt.label}</div>
      <div class="quad-desc">${txt.detail}</div>
    </div>`;
  }).join('');
  return`<div class="rs"><div class="rs-title">성과 × 감정 사분면</div><div class="quad-grid">${cards}</div></div>`;
}

/* ── 직업 추천: 이중 바 (금=직업 기준 / 파=내 비중) ── */
function rRec(){
  const p=state.axisProfile;
  const blocks=state.selectedJobs.map(jc=>{
    const jd=JOB_DEFS.find(j=>j.job_code===jc);
    const jw=JOB_WEIGHTS[jd.real_job_code];
    if(!jw)return'';
    const sc=state.compatibility[jc]||0;
    const isLowScore=sc<60;
    const recs=isLowScore
      ? getCrossClusterRecommendations(p,jw.c,jd.real_job_code,3)
      : getRecommendations(p,jw.c,jd.real_job_code,3);
    if(!recs.length)return'';

    const cards=recs.map(r=>{
      const simPct=Math.round((r.sim+1)/2*100);
      // 각 축: 직업값(금) vs 내값(파) 이중 바
      // 두 값 모두 RADAR_SCALE 기준으로 퍼센트화 → 바가 채워지는 정도로 맞음/안맞음 직관적으로 표시
      // 내 axisProfile 기준 각 축 점수 (0~100)
      const myScore=Math.round(((p.AX1||0)+(p.AX2||0)+(p.AX3||0)+(p.AX4||0)+(p.AX5||0))*100);
      const bars=AXES.map(ax=>{
        const jobPct=Math.min((r.w[ax]||0)*RADAR_SCALE*100,100); // 직업 기준 (바 너비용)
        const mePct =Math.min((p[ax]||0)*RADAR_SCALE*100,100);   // 내 비중 (바 너비용)
        const diff=Math.abs(jobPct-mePct);
        const matchColor=diff<15?'var(--success)':diff<30?'var(--warn)':'var(--danger)';
        const matchLabel=diff<15?'적합':diff<30?'보통':'차이 있음';
        return`<div class="ax-row">
          <span class="ax-lbl">${AX_LABELS[ax].split('·')[0]}</span>
          <div class="ax-bw">
            <div class="ax-bf-job" style="width:${jobPct.toFixed(0)}%"></div>
            <div class="ax-bf-me"  style="width:${mePct.toFixed(0)}%;opacity:0.85"></div>
          </div>
          <span class="ax-vals" style="color:${matchColor}">${matchLabel}</span>
        </div>`;
      }).join('');

      return`<div class="rec-card">
        <div class="rec-hdr">
          <span class="rec-jname">${r.name}</span>
          <span class="rec-pct">유사도 ${simPct}%</span>
        </div>
        <div style="font-size:11px;color:var(--sub);margin-bottom:8px">파란 바=내 역량 비중 / 금색 바=직업 기준</div>
        <div class="ax-bars">${bars}</div>
      </div>`;
    }).join('');

    const lowMsg=sc<60
      ?`<p style="font-size:13px;color:var(--sub);margin-bottom:12px">${jd.job_name} 적합도 <b style="color:var(--warn)">${sc}점</b> — 다른 방향의 직업군에서 더 잘 맞는 직업을 찾아봤어요.</p>`
      :`<p style="font-size:13px;color:var(--sub);margin-bottom:12px">같은 직업군(군집 ${jw.c}) 내 유사 직업도 살펴보세요.</p>`;
    return`<div style="margin-bottom:28px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">${jd.icon} ${jd.job_name} 관련 추천</div>
      ${lowMsg}<div class="rec-list">${cards}</div>
    </div>`;
  }).join('');
  if(!blocks.trim())return'';
  return`<div class="rs"><div class="rs-title">혹시 이 직업도 찾아보세요 (KNOW 직업사전 기반)</div>${blocks}</div>`;
}

/* ── 기대 vs 현실 ── */

// 축 기반 역량 성격 설명
const AX_NATURE = {
  AX1: '데이터 분석 및 논리적 추론',
  AX2: '현상 관찰 및 세부 탐색',
  AX3: '전략 수립 및 의사결정',
  AX4: '팀 협업 및 조직 조율',
  AX5: '고객 공감 및 소통'
};

// 유저 입력 텍스트에서 주요 성격 추론
function inferExpectNature(q1, q2){
  const text=(q1+' '+q2).toLowerCase();
  const signals={
    AX1:['분석','데이터','수치','논리','통계','파악','원인'],
    AX2:['관찰','탐색','확인','조사','현황','점검'],
    AX3:['전략','기획','의사결정','방향','우선순위','판단','계획'],
    AX4:['협업','팀','소통','보고','조율','관리','리더'],
    AX5:['고객','서비스','공감','응대','소통','만족','케어']
  };
  const scores={};
  AXES.forEach(ax=>{
    scores[ax]=(signals[ax]||[]).filter(k=>text.includes(k)).length;
  });
  const top=AXES.sort((a,b)=>scores[b]-scores[a]).filter(ax=>scores[ax]>0);
  if(!top.length)return null;
  return top.slice(0,2).map(ax=>AX_NATURE[ax]);
}

// 미션 axis_signals에서 실제 요구 역량 추론
function inferMissionNature(missions){
  const avg={};
  AXES.forEach(ax=>avg[ax]=0);
  missions.filter(Boolean).forEach(m=>{
    AXES.forEach(ax=>{ avg[ax]+=(m.axis_signals?.[ax]||0); });
  });
  const sorted=AXES.slice().sort((a,b)=>avg[b]-avg[a]);
  return sorted.slice(0,2).filter(ax=>avg[ax]>0).map(ax=>AX_NATURE[ax]);
}

function gapSummary(jc){
  const ans=state.preqAnswers[jc]||{};
  const missions=getMissions(jc);
  const scores=state.missionScores[jc]||[];
  const q1=ans.q1||'';
  const q2=ans.q2||'';

  // 기대 요약
  const expectNature=inferExpectNature(q1,q2);
  const expectLine=expectNature&&expectNature.length
    ? expectNature.join(' · ') + ' 중심'
    : '사전 예상이 입력되지 않았습니다';

  // 실제 미션 요구 역량 요약
  const missionNature=inferMissionNature(missions);
  const realLine=missionNature.length
    ? missionNature.join(' · ') + ' 중심'
    : '미션 데이터 없음';

  // 실제 수행 패턴 (유저가 실제로 보여준 역량)
  const performed={};
  AXES.forEach(ax=>performed[ax]=0);
  scores.forEach(s=>AXES.forEach(ax=>{ performed[ax]+=(s[ax]||0); }));
  const topPerf=AXES.slice().sort((a,b)=>performed[b]-performed[a]).filter(ax=>performed[ax]>0);
  const perfLine=topPerf.length
    ? topPerf.slice(0,2).map(ax=>AX_NATURE[ax]).join(' · ') + ' 위주로 수행'
    : '수행 데이터 없음';

  // 기대-현실 차이 코멘트
  const expectAxes=expectNature?AXES.filter(ax=>expectNature.includes(AX_NATURE[ax])):[];
  const realAxes=AXES.filter(ax=>missionNature.includes(AX_NATURE[ax]));
  const match=expectAxes.filter(ax=>realAxes.includes(ax));
  let diffComment='';
  if(!q1&&!q2){
    diffComment='사전 예상을 입력하지 않아 비교가 어렵습니다.';
  } else if(match.length>=2){
    diffComment='기대한 역량과 실제 미션 요구 역량이 잘 일치합니다.';
  } else if(match.length===1){
    diffComment=`기대와 현실이 "${AX_NATURE[match[0]]}" 측면에서 부분적으로 일치합니다.`;
  } else {
    diffComment='기대했던 역량보다 다른 방향의 사고가 실제 미션에서 요구되었습니다.';
  }

  return{expectLine, realLine, perfLine, diffComment};
}

function rGap(){
  const cards=state.selectedJobs.map(jc=>{
    const jd=JOB_DEFS.find(j=>j.job_code===jc);
    const {expectLine,realLine,perfLine,diffComment}=gapSummary(jc);
    return`<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px">${jd.icon} ${jd.job_name}</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:11px;color:var(--sub);min-width:48px;flex-shrink:0">기대</span>
          <span style="font-size:13px;color:var(--text)">${esc(expectLine)}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:11px;color:var(--sub);min-width:48px;flex-shrink:0">현실</span>
          <span style="font-size:13px;color:var(--text)">${esc(realLine)}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span style="font-size:11px;color:var(--sub);min-width:48px;flex-shrink:0">수행</span>
          <span style="font-size:13px;color:var(--accent-hi)">${esc(perfLine)}</span>
        </div>
      </div>
      <div style="font-size:12px;color:var(--accent);border-top:1px solid var(--border);padding-top:10px">💡 ${esc(diffComment)}</div>
    </div>`;
  }).join('');
  return`<div class="rs"><div class="rs-title">기대 vs 현실</div>${cards}</div>`;
}

/* ── 이벤트 ── */
function bindEvents(){
  document.querySelectorAll('.job-card').forEach(el=>el.addEventListener('click',()=>{
    const jc=el.dataset.jc;
    const idx=state.selectedJobs.indexOf(jc);
    idx>=0?state.selectedJobs.splice(idx,1):state.selectedJobs.push(jc);
    render();
  }));
  const S=id=>document.getElementById(id);
  S('btn-start')?.addEventListener('click',()=>{state.screen='preq';state.preqIndex=0;render();});
  S('btn-pnext')?.addEventListener('click',()=>{
    const jc=state.selectedJobs[state.preqIndex];
    state.preqAnswers[jc]={q1:S('pq1')?.value||'',q2:S('pq2')?.value||''};
    if(state.preqIndex<state.selectedJobs.length-1){state.preqIndex++;render();}
    else{state.screen='mission';state.missionJobIndex=0;state.missionStepIndex=0;state.missionAnswer='';state.selectedOption=null;render();}
  });
  S('btn-pback')?.addEventListener('click',()=>{state.preqIndex--;render();});
  S('m-ans')?.addEventListener('input',e=>{state.missionAnswer=e.target.value;refreshBtn();});
  document.querySelectorAll('.opt-btn').forEach(el=>el.addEventListener('click',()=>{
    state.selectedOption=parseInt(el.dataset.opt);
    document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel'));
    el.classList.add('sel');refreshBtn();
  }));
  document.querySelectorAll('.sr-btn').forEach(el=>el.addEventListener('click',()=>{
    const m=curMission();if(!m)return;
    if(!state.selfReport[m.mission_id])state.selfReport[m.mission_id]={};
    state.selfReport[m.mission_id][el.dataset.sr]=parseInt(el.dataset.val);
    el.closest('.sr-opts').querySelectorAll('.sr-btn').forEach(b=>b.classList.remove('sel'));
    el.classList.add('sel');refreshBtn();
  }));
  S('btn-mnext')?.addEventListener('click',async()=>{
    const m=curMission();if(!m)return;
    const btn=S('btn-mnext');
    if(btn){btn.disabled=true;btn.textContent='분석 중...';}
    const ans=m.input_type==='multiple_choice'?(m.options[state.selectedOption]||''):state.missionAnswer;
    if(!state.missionScores[m.job_code])state.missionScores[m.job_code]=[];
    const scored=await scoreAnswer(ans,m);
    state.missionScores[m.job_code].push(scored.missionScore);
    saveEvaluationLog({
      schema_version:1,
      session_id:state.sessionId||(state.sessionId=crypto.randomUUID?.()||String(Date.now())),
      created_at:new Date().toISOString(),
      user_key:'local-anonymous',
      job_code:m.job_code,
      mission_id:m.mission_id,
      mission_title:m.title,
      answer:ans,
      self_report:state.selfReport[m.mission_id]||{},
      prompt_version:scored.evaluation.prompt_version,
      evaluation:scored.evaluation,
      mission_score:scored.missionScore
    });
    advance();
  });
  S('btn-restart')?.addEventListener('click',()=>{
    Object.assign(state,{screen:'select',selectedJobs:[],preqIndex:0,preqAnswers:{},
      missionJobIndex:0,missionStepIndex:0,missionAnswer:'',selectedOption:null,
      selfReport:{},missionScores:{},evaluationLogs:[],axisProfile:null,compatibility:{}});
    render();
  });
}

function refreshBtn(){
  const btn=document.getElementById('btn-mnext');if(!btn)return;
  const m=curMission();if(!m)return;
  const sr=state.selfReport[m.mission_id]||{};
  const ok=(m.input_type==='multiple_choice'?state.selectedOption!==null:state.missionAnswer.trim().length>10)
           &&(sr.fun&&sr.difficulty&&sr.imagine);
  btn.disabled=!ok;
}

function advance(){
  const jc=state.selectedJobs[state.missionJobIndex];
  const ms=getMissions(jc);
  if(state.missionStepIndex<ms.length-1){state.missionStepIndex++;state.missionAnswer='';state.selectedOption=null;}
  else if(state.missionJobIndex<state.selectedJobs.length-1){state.missionJobIndex++;state.missionStepIndex=0;state.missionAnswer='';state.selectedOption=null;}
  else{state.screen='result';}
  render();
}

render();
</script>
